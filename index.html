<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joc Phaser - Drag & Drop</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #e0f2f1; /* Culoare de fundal mai calmă */
        overflow: hidden; /* Evită apariția scroll-ului pe mobil */
      }
      canvas {
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
      }

      /* Stiluri HTML pentru text și butoane (Atrăgătoare pentru copii) */
      .game-title {
        font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
        font-size: 48px;
        color: #fff;
        background: #f4a261;
        padding: 15px 40px;
        border-radius: 30px;
        border: 4px solid #fff;
        box-shadow: 0 6px 0 #e76f51;
        text-align: center;
        user-select: none;
      }
      .game-button {
        font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
        font-size: 28px;
        color: #fff;
        background: #457b9d;
        border: 4px solid #fff;
        border-radius: 25px;
        padding: 15px 40px;
        box-shadow: 0px 8px 0px #1d3557;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s,
          box-shadow 0.2s,
          margin-top 0.2s,
          margin-bottom 0.2s;
        pointer-events: auto; /* Permite interacțiunea cu mouse/touch */
        user-select: none;
      }
      .game-button:hover {
        background: #ffe066;
        color: #264653;
        margin-top: 4px;
        margin-bottom: -4px;
        box-shadow: 0px 4px 0px #1d3557;
      }
      .game-button:active {
        margin-top: 8px;
        margin-bottom: -8px;
        box-shadow: 0px 0px 0px #1d3557;
      }
      .home-button {
        font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
        font-size: 20px;
        color: #fff;
        background: #e76f51;
        border: 3px solid #fff;
        border-radius: 15px;
        padding: 10px 20px;
        box-shadow: 0px 5px 0px #c44536;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s,
          box-shadow 0.2s,
          margin-top 0.2s,
          margin-bottom 0.2s;
        pointer-events: auto;
        user-select: none;
      }
      .home-button:hover {
        background: #ffe066;
        color: #264653;
        margin-top: 2px;
        margin-bottom: -2px;
        box-shadow: 0px 3px 0px #c44536;
      }
      .home-button:active {
        margin-top: 5px;
        margin-bottom: -5px;
        box-shadow: 0px 0px 0px #c44536;
      }
      .success-text {
        font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
        font-size: 40px;
        color: #fff;
        background: #2a9d8f;
        padding: 20px 40px;
        border-radius: 20px;
        border: 5px dashed #fff;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        text-align: center;
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        user-select: none;
      }
      @keyframes pop {
        0% {
          scale: 0.5;
          opacity: 0;
        }
        100% {
          scale: 1;
          opacity: 1;
        }
      }
      /* Adaptare pentru ecranele mici de telefoane mobile */
      @media (max-width: 600px) {
        .game-title {
          font-size: 32px;
          padding: 10px 20px;
        }
        .game-button {
          font-size: 20px;
          padding: 10px 20px;
        }
        .success-text {
          font-size: 24px;
          padding: 15px 25px;
          border-width: 3px;
        }
        .home-button {
          font-size: 16px;
          padding: 8px 15px;
        }
      }
    </style>
    <!-- Încărcăm biblioteca Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  </head>
  <body>
    <!-- Aici va rula jocul -->
    <script type="module" src="game.js"></script>
  </body>
</html>
